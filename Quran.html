<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ഖുർആൻ പഠന സഹായി</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Quicksand:wght@400;600;700&family=Manjari:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', 'Manjari', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .font-arabic { font-family: 'Amiri', serif; }
        .ayah-card { transition: all 0.3s ease; border-radius: 20px; }
        .ayah-card:hover { transform: scale(1.01); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .active-surah { background-color: #059669 !important; color: white !important; transform: scale(1.02); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
        
        #registrationOverlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #065f46 0%, #059669 100%);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
    </style>
</head>
<body class="text-gray-800">

    <!-- Step 1: Registration Page -->
    <div id="registrationOverlay">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl p-8 md:p-10 text-center animate-in fade-in zoom-in duration-300">
            <div class="w-20 h-20 bg-green-100 text-green-600 rounded-3xl flex items-center justify-center text-4xl mx-auto mb-6 shadow-lg">
                📖
            </div>
            <h1 class="text-2xl font-bold text-gray-800 mb-2">സ്വാഗതം!</h1>
            <p class="text-gray-500 text-sm mb-8 font-medium">പഠനം തുടങ്ങുന്നതിനായി നിങ്ങളുടെ വിവരങ്ങൾ നൽകുക</p>
            
            <div class="space-y-4 text-left">
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest text-green-600 mb-1 ml-2">പേര് (Name)</label>
                    <input type="text" id="studentName" placeholder="കുട്ടിയുടെ പേര്" class="w-full px-5 py-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:border-green-500 focus:bg-white outline-none transition-all font-bold">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-black uppercase tracking-widest text-green-600 mb-1 ml-2">ക്ലാസ് (Class)</label>
                        <input type="text" id="studentClass" placeholder="ക്ലാസ്" class="w-full px-5 py-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:border-green-500 focus:bg-white outline-none transition-all font-bold">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black uppercase tracking-widest text-green-600 mb-1 ml-2">സ്ഥലം (Place)</label>
                        <input type="text" id="studentPlace" placeholder="സ്ഥലം" class="w-full px-5 py-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:border-green-500 focus:bg-white outline-none transition-all font-bold">
                    </div>
                </div>
            </div>

            <button id="saveBtn" onclick="saveUserAndStart()" class="w-full mt-10 bg-green-600 hover:bg-green-700 text-white font-bold py-5 rounded-2xl shadow-xl shadow-green-200 transition-all active:scale-95 text-lg">
                SAVE & START
            </button>
        </div>
    </div>

    <!-- Step 2: Main Application -->
    <div id="mainApp" class="hidden">
        <nav class="bg-white/80 backdrop-blur-md shadow-sm p-4 flex justify-between items-center sticky top-0 z-50 border-b border-green-100">
            <div class="flex items-center gap-3">
                <div class="bg-green-600 p-2 rounded-xl text-white font-bold shadow-lg shadow-green-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-green-800 leading-tight">ഖുർആൻ പഠനം</h1>
                    <p id="displayUserInfo" class="text-[10px] text-green-600 font-bold uppercase tracking-wider">പഠിതാവ്</p>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="hidden md:block">
                    <select id="qariSelect" class="bg-gray-50 border-none text-xs font-bold p-1 rounded focus:ring-0 cursor-pointer text-green-700">
                        <option value="ar.alafasy">മിശാരി റാഷിദ് അൽ അഫാസി</option>
                        <option value="ar.abdurrahmaansudais">അബ്ദുറഹ്മാൻ അൽ സുദൈസ്</option>
                        <option value="ar.saoodshuraym">സൗദ് അൽ ശുറൈം</option>
                        <option value="ar.mahermuaiqly">മാഹിർ അൽ മുഐക്ലി</option>
                    </select>
                </div>
                <div class="bg-yellow-100 text-yellow-700 px-4 py-2 rounded-2xl text-xs font-bold flex items-center gap-2 border border-yellow-200">
                    ⭐ <span id="pointsDisplay">500</span>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-4 gap-6">
            <aside class="lg:col-span-1 bg-white rounded-3xl shadow-xl shadow-gray-200/50 border border-gray-100 flex flex-col h-[85vh] overflow-hidden">
                <div class="p-4 border-b bg-gray-50/50">
                    <input type="text" id="searchInput" placeholder="സൂറത്ത് തിരയുക..." class="w-full px-4 py-3 text-sm border-none bg-white rounded-2xl shadow-inner focus:ring-2 focus:ring-green-500 transition-all">
                </div>
                <div id="surahList" class="overflow-y-auto flex-1 p-3 space-y-2">
                    <div class="py-10 text-center text-gray-400 text-sm italic">സൂറത്തുകൾ ലോഡ് ചെയ്യുന്നു...</div>
                </div>
            </aside>

            <section class="lg:col-span-3 space-y-6">
                <div class="bg-white rounded-[2rem] shadow-xl shadow-gray-200/50 border border-gray-100 overflow-hidden min-h-[85vh]">
                    <div id="surahHeader" class="bg-gradient-to-br from-emerald-600 to-green-500 p-10 text-white text-center relative">
                        <h2 id="headerArabicName" class="text-5xl font-arabic mb-3">...</h2>
                        <h3 id="headerEnglishName" class="text-xl font-bold mb-8 opacity-90 tracking-wide">സൂറത്ത് തിരഞ്ഞെടുക്കുക</h3>
                        <button id="playFullBtn" class="bg-white text-green-700 px-10 py-4 rounded-2xl font-bold shadow-2xl hover:bg-yellow-400 transition-all active:scale-95 flex items-center gap-3 mx-auto">
                            <span id="playIcon">▶</span> <span id="playText">സൂറത്ത് കേൾക്കാം</span>
                        </button>
                    </div>
                    <div id="ayahContainer" class="p-6 md:p-12 space-y-12">
                        <div class="py-32 text-center text-gray-400 font-bold">📖 ദയവായി ഒരു സൂറത്ത് തിരഞ്ഞെടുക്കുക</div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        let allSurahs = [];
        let currentSurahId = 1;
        let surahData = null;
        let isFullPlay = false;
        let playingIndex = -1;
        let hasBismiPlayedForCurrentSurah = false; 
        const audio = new Audio();

        const regOverlay = document.getElementById('registrationOverlay');
        const mainApp = document.getElementById('mainApp');
        const displayUserInfo = document.getElementById('displayUserInfo');

        // Check if user already exists
        window.addEventListener('load', () => {
            const savedName = localStorage.getItem('quran_student_name');
            if (savedName) {
                showMainApp(savedName, localStorage.getItem('quran_student_class'), localStorage.getItem('quran_student_place'));
            }
        });

        function saveUserAndStart() {
            const name = document.getElementById('studentName').value.trim();
            const sClass = document.getElementById('studentClass').value.trim();
            const place = document.getElementById('studentPlace').value.trim();

            if (!name || !sClass || !place) {
                alert("ദയവായി പേരും ക്ലാസും സ്ഥലവും നൽകുക.");
                return;
            }

            try {
                localStorage.setItem('quran_student_name', name);
                localStorage.setItem('quran_student_class', sClass);
                localStorage.setItem('quran_student_place', place);
            } catch (e) {
                console.warn("LocalStorage access failed, using session only.");
            }

            showMainApp(name, sClass, place);
        }

        function showMainApp(name, sClass, place) {
            regOverlay.style.display = 'none';
            mainApp.classList.remove('hidden');
            displayUserInfo.innerText = `${name} | ക്ലാസ്: ${sClass} | ${place}`;
            initApp();
        }

        async function initApp() {
            try {
                const res = await fetch('https://api.alquran.cloud/v1/surah');
                const data = await res.json();
                allSurahs = data.data;
                renderSurahList(allSurahs);
                loadSurah(1);
            } catch (err) {
                console.error("Fetch error", err);
            }
        }

        function renderSurahList(list) {
            const surahListEl = document.getElementById('surahList');
            surahListEl.innerHTML = list.map(s => `
                <button onclick="loadSurah(${s.number})" class="w-full flex items-center justify-between p-4 rounded-2xl transition-all ${currentSurahId === s.number ? 'active-surah shadow-lg' : 'hover:bg-green-50 text-gray-600'}">
                    <div class="flex items-center gap-4 text-left">
                        <span class="w-8 h-8 rounded-lg flex items-center justify-center text-xs font-black ${currentSurahId === s.number ? 'bg-white/20' : 'bg-gray-100 text-gray-500'}">${s.number}</span>
                        <div>
                            <p class="text-sm font-bold leading-tight">${s.englishName}</p>
                            <p class="text-[10px] opacity-60 font-bold">${s.name}</p>
                        </div>
                    </div>
                </button>
            `).join('');
        }

        async function loadSurah(id) {
            currentSurahId = id;
            hasBismiPlayedForCurrentSurah = false;
            stopAudio();
            renderSurahList(allSurahs);
            
            const ayahContainer = document.getElementById('ayahContainer');
            ayahContainer.innerHTML = '<div class="py-20 text-center text-green-600 font-bold animate-pulse">ലോഡ് ചെയ്യുന്നു...</div>';
            
            const qari = document.getElementById('qariSelect').value;
            try {
                const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}/editions/quran-uthmani,ml.abdulhameed,${qari}`);
                const data = await res.json();
                surahData = data.data;
                
                document.getElementById('headerArabicName').innerText = surahData[0].name;
                document.getElementById('headerEnglishName').innerText = surahData[0].englishName;
                renderAyahs();
            } catch (err) {
                ayahContainer.innerHTML = '<div class="text-red-500 text-center font-bold py-20">പിശക് സംഭവിച്ചു!</div>';
            }
        }

        function renderAyahs() {
            let html = '';
            if (currentSurahId !== 1 && currentSurahId !== 9) {
                html += `
                    <div id="bismiBlock" class="text-center py-10 mb-8 bg-green-50/30 rounded-[2rem] border-2 border-dashed border-green-100">
                        <p class="text-5xl font-arabic text-green-900 mb-2">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّﺤِيمِ</p>
                        <p class="text-xs text-green-600 font-bold italic">അല്ലാഹുവിന്റെ നാമത്തിൽ</p>
                    </div>`;
            }

            surahData[0].ayahs.forEach((ayah, i) => {
                let text = ayah.text;
                if (i === 0 && currentSurahId !== 1 && currentSurahId !== 9) {
                    text = text.replace(/^(بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ)/, "").trim();
                }

                html += `
                    <div id="ayah-${i}" class="ayah-card p-8 bg-white border border-gray-100 shadow-sm mb-6">
                        <div class="flex items-center gap-4 mb-6">
                            <button onclick="toggleSingle(${i})" id="btn-${i}" class="w-12 h-12 rounded-2xl flex items-center justify-center bg-green-50 text-green-600 font-bold text-xl transition-all">▶</button>
                            <span class="text-[10px] font-black text-gray-400">ആയത്ത് ${ayah.numberInSurah}</span>
                        </div>
                        <p class="text-4xl md:text-5xl font-arabic text-right leading-[2.2] mb-8" dir="rtl">${text}</p>
                        <div class="bg-gray-50 p-6 rounded-2xl border-l-4 border-green-500">
                            <p class="text-base text-gray-700 font-bold">${surahData[1].ayahs[i].text}</p>
                        </div>
                    </div>`;
            });
            document.getElementById('ayahContainer').innerHTML = html;
        }

        function playAyah(index) {
            if (index >= surahData[0].ayahs.length) { stopAudio(); return; }
            playingIndex = index;
            audio.src = surahData[2].ayahs[index].audio;
            audio.play();
            
            document.querySelectorAll('.ayah-card').forEach(c => c.classList.remove('bg-green-50/50', 'ring-2', 'ring-green-500'));
            const card = document.getElementById(`ayah-${index}`);
            card.classList.add('bg-green-50/50', 'ring-2', 'ring-green-500');
            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            
            document.querySelectorAll('[id^="btn-"]').forEach(b => b.innerText = '▶');
            document.getElementById(`btn-${index}`).innerText = '⏸';

            audio.onended = () => { if (isFullPlay) playAyah(index + 1); else stopAudio(); };
        }

        function toggleSingle(index) {
            if (playingIndex === index && !isFullPlay) stopAudio();
            else { isFullPlay = false; updateFullPlayBtn(); playAyah(index); }
        }

        document.getElementById('playFullBtn').onclick = () => {
            if (isFullPlay) stopAudio();
            else {
                isFullPlay = true;
                updateFullPlayBtn();
                if (currentSurahId === 1 || currentSurahId === 9 || hasBismiPlayedForCurrentSurah) {
                    playAyah(0);
                } else {
                    document.getElementById('playText').innerText = "ബിസ്മി...";
                    audio.src = "https://cdn.islamic.network/quran/audio/128/ar.alafasy/1.mp3";
                    audio.play();
                    audio.onended = () => {
                        hasBismiPlayedForCurrentSurah = true;
                        document.getElementById('playText').innerText = "പാരായണം...";
                        playAyah(0);
                    };
                }
            }
        };

        function stopAudio() {
            audio.pause();
            playingIndex = -1;
            isFullPlay = false;
            updateFullPlayBtn();
            document.querySelectorAll('.ayah-card').forEach(c => c.classList.remove('bg-green-50/50', 'ring-2', 'ring-green-500'));
            document.querySelectorAll('[id^="btn-"]').forEach(b => b.innerText = '▶');
        }

        function updateFullPlayBtn() {
            document.getElementById('playIcon').innerText = isFullPlay ? '⏸' : '▶';
            document.getElementById('playText').innerText = isFullPlay ? 'നിർത്താം' : 'സൂറത്ത് കേൾക്കാം';
        }

        document.getElementById('searchInput').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = allSurahs.filter(s => s.englishName.toLowerCase().includes(val) || s.number.toString() === val);
            renderSurahList(filtered);
        };

        document.getElementById('qariSelect').onchange = () => loadSurah(currentSurahId);
    </script>
</body>
</html>
